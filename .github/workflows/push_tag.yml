name: Build and publish
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
    - uses: actions/checkout@v4
    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
    - name: Install dependencies
      run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev uuid-dev
    - name: Build with GCC
      run: |
        gcc -Wall -W -O2 main.c -luuid -lcrypto -o fise-${{ steps.version.outputs.VERSION }}-linux-x64
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          fise-${{ steps.version.outputs.VERSION }}-linux-x64
        generate_release_notes: true

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Convert repository owner to lowercase
      id: repo_owner
      run: echo "OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      
    - name: Build and push Docker images
      uses: docker/build-push-action@v6.18.0
      with:
        tags: |
          ghcr.io/${{ steps.repo_owner.outputs.OWNER }}/${{github.event.repository.name}}:latest
          ghcr.io/${{ steps.repo_owner.outputs.OWNER }}/${{github.event.repository.name}}:${{ steps.version.outputs.VERSION }}
        push: true
        context: .
